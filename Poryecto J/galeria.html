<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería Hello Kitty</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ffe6f2,#fff);
height:100vh;
margin:0;
overflow:hidden;
}

h1{
color:#ff4d94;
margin-top:20px;
}

.container{
margin-top:20px;
}

img{
max-width:300px;
transition:0.5s;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.controls{

margin-top:20px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;

}

button{

padding:10px 18px;
border:none;
border-radius:20px;
background:#ff4d94;
color:white;
cursor:pointer;
font-size:14px;
transition:0.3s;

}

button:hover{

transform:scale(1.1);
background:#ff1a75;

}

.heart{

position:absolute;
color:#ff4d94;
font-size:20px;
animation:fall 4s linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-50px);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>
</head>

<body>

<h1>🎀 Galería Hello Kitty 🎀</h1>

<input type="file" id="upload" accept="Spiderman.webp">

<div class="container">

<img id="foto">

</div>

<div class="controls">


<button onclick="rotar()">🔄 Rotar</button>
<button onclick="filtro()">✨ Filtro kawaii</button>
<button onclick="corazones()">💖 Lluvia de corazones</button>
<button onclick="fondo()">🌈 Cambiar fondo</button>
<button onclick="volver()">⬅ Volver</button>

</div>

<script>

let escala=1
let rotacion=0
let filtroActivo=false

let foto=document.getElementById("foto")

document.getElementById("upload").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(){

foto.src=reader.result

}

reader.readAsDataURL(e.target.files[0])

})

function zoom(){

escala+=0.2
foto.style.transform="scale("+escala+") rotate("+rotacion+"deg)"

}

function rotar(){

rotacion+=15
foto.style.transform="scale("+escala+") rotate("+rotacion+"deg)"

}

function filtro(){

if(!filtroActivo){

foto.style.filter="brightness(1.2) saturate(1.5) hue-rotate(20deg)"
filtroActivo=true

}else{

foto.style.filter="none"
filtroActivo=false

}

}

function corazones(){

for(let i=0;i<20;i++){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="❤"

h.style.left=Math.random()*100+"vw"
h.style.fontSize=(15+Math.random()*25)+"px"

document.body.appendChild(h)

setTimeout(()=>{
h.remove()
},4000)

}

}

function fondo(){

let colores=[
"linear-gradient(135deg,#ffe6f2,#fff)",
"linear-gradient(135deg,#ffd1f0,#ffe6ff)",
"linear-gradient(135deg,#ffcce6,#fff0f5)",
"linear-gradient(135deg,#fff,#ffd6ec)"
]

document.body.style.background=
colores[Math.floor(Math.random()*colores.length)]

}

function volver(){

window.location.href="Hello_kityy.html"

}

</script>

</body>
</html>
